jobs:
- job: Linux
  pool:
    vmImage: 'ubuntu-16.04'
  steps:
  - task: UseRubyVersion@0
    inputs:
      versionSpec: '2.5.1'
  - script: sudo apt update -qy && sudo apt-get build-dep ruby2.3
  - script: |
      autoconf
      ./configure
      make
    displayName: 'make'
  - script: |
      make test
      make test-all
      make test-spec
    displayName: "make exam"

- job: macOS
  pool:
    vmImage: 'macos-10.13'
  steps:
  - script: brew update && brew install autoconf bison
  - script: |
      autoconf
      ./configure
      make
    displayName: 'make'
  - script: |
      make test
      make test-all
      make test-spec
    displayName: "make exam"

- job: Windows
  pool:
    vmImage: 'vs2017-win2016'
  steps:
  - script: |
      win32/configure.bat
      nmake
    displayName: 'nmake'
  - script: |
      nmake test
      nmake test-all
      nmake test-spec
    displayName: "nmake exam"
